# add-on

addon.espsomfy.name = ESPSomfy Binding
addon.espsomfy.description = Binding for ESPSomfy-RTS firmware devices that control Somfy RTS motorized shades, blinds, and awnings via radio.

# thing types

thing-type.espsomfy.controller.label = ESPSomfy-RTS Controller
thing-type.espsomfy.controller.description = An ESPSomfy-RTS controller device that manages Somfy RTS shades via radio.
thing-type.espsomfy.group.label = ESPSomfy Group
thing-type.espsomfy.group.description = A group of Somfy RTS shades that can be controlled together.
thing-type.espsomfy.shade.label = ESPSomfy Shade
thing-type.espsomfy.shade.description = A Somfy RTS motorized shade, blind, awning, or shutter.

# thing types config

thing-type.config.espsomfy.controller.hostname.label = Hostname
thing-type.config.espsomfy.controller.hostname.description = Hostname or IP address of the ESPSomfy-RTS device.
thing-type.config.espsomfy.controller.password.label = Password
thing-type.config.espsomfy.controller.password.description = PIN or password if device security is enabled.
thing-type.config.espsomfy.controller.port.label = Port
thing-type.config.espsomfy.controller.port.description = HTTP port of the ESPSomfy-RTS device.
thing-type.config.espsomfy.controller.refreshInterval.label = Refresh Interval
thing-type.config.espsomfy.controller.refreshInterval.description = Interval in seconds to poll the device for state updates.
thing-type.config.espsomfy.group.groupId.label = Group ID
thing-type.config.espsomfy.group.groupId.description = The group ID as configured on the ESPSomfy-RTS device (0-15).
thing-type.config.espsomfy.shade.shadeId.label = Shade ID
thing-type.config.espsomfy.shade.shadeId.description = The shade ID as configured on the ESPSomfy-RTS device (0-31).

# channel types

channel-type.espsomfy.command-channel.label = Command
channel-type.espsomfy.command-channel.description = Send a virtual remote command to the shade.
channel-type.espsomfy.command-channel.state.option.My = My
channel-type.espsomfy.command-channel.state.option.Up = Up
channel-type.espsomfy.command-channel.state.option.Down = Down
channel-type.espsomfy.command-channel.state.option.Prog = Prog
channel-type.espsomfy.command-channel.state.option.SunFlag = SunFlag
channel-type.espsomfy.command-channel.state.option.Flag = Flag
channel-type.espsomfy.command-channel.state.option.StepUp = StepUp
channel-type.espsomfy.command-channel.state.option.StepDown = StepDown
channel-type.espsomfy.command-channel.state.option.Toggle = Toggle
channel-type.espsomfy.direction-channel.label = Direction
channel-type.espsomfy.direction-channel.description = Current movement direction (-1 = opening, 0 = stopped, 1 = closing).
channel-type.espsomfy.my-position-channel.label = My Position
channel-type.espsomfy.my-position-channel.description = The configured favorite (My) position (-1 if not set).
channel-type.espsomfy.position-channel.label = Position
channel-type.espsomfy.position-channel.description = Shade position (0% = open, 100% = closed).
channel-type.espsomfy.sunny-channel.label = Sun Sensor
channel-type.espsomfy.sunny-channel.description = Sun sensor state reported by the shade.
channel-type.espsomfy.tilt-channel.label = Tilt Position
channel-type.espsomfy.tilt-channel.description = Tilt angle for venetian blinds (0% = open, 100% = closed).
channel-type.espsomfy.version-channel.label = Firmware Version
channel-type.espsomfy.version-channel.description = Firmware version of the ESPSomfy-RTS controller.
channel-type.espsomfy.windy-channel.label = Wind Sensor
channel-type.espsomfy.windy-channel.description = Wind sensor state reported by the shade.
